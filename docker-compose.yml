services:
  postgres:
    image: postgres:17-alpine
    container_name: vietnest-postgres
    environment:
      POSTGRES_DB: mock-marketplace
      POSTGRES_USER: vietnest
      POSTGRES_PASSWORD: vietnest
    ports:
      - "5433:5432"
    volumes:
      - vietnest_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vietnest -d mock-marketplace"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  vietnest_pgdata:
