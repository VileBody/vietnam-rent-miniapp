apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vietnam-rent
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/VileBody/vietnam-rent-miniapp.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: vietnam-rent
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
