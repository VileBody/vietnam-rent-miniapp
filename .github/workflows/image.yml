name: app image

on:
  push:
    branches:
      - main
    paths:
      - "cmd/**"
      - "docs/**"
      - "app.js"
      - "index.html"
      - "styles.css"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/image.yml"
      - "k8s/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/vilebody/vietnam-rent-miniapp:main
            ghcr.io/vilebody/vietnam-rent-miniapp:${{ github.sha }}
