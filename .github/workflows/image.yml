name: VietNest image and deploy manifest

on:
  push:
    branches:
      - main
    paths:
      - "cmd/**"
      - "docs/**"
      - "app.js"
      - "index.html"
      - "styles.css"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/image.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ai-native-paas-registry.registry.twcstorage.ru
      REGISTRY_USERNAME: ai-native-paas-registry
      IMAGE: ai-native-paas-registry.registry.twcstorage.ru/mirror/legacy/vietnest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.TWC_REGISTRY_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Pin the deployed image digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path("k8s/app.yaml")
          content = path.read_text()
          image = f"{os.environ['IMAGE']}@{os.environ['DIGEST']}"
          updated, count = re.subn(
              r"(?m)^(\s*image:)\s+\S+$",
              rf"\1 {image}",
              content,
              count=1,
          )
          if count != 1:
              raise SystemExit("expected exactly one VietNest image field")
          path.write_text(updated)
          PY

          git diff --check
          if git diff --quiet -- k8s/app.yaml; then
            exit 0
          fi

          git config user.name "vietnest-deploy[bot]"
          git config user.email "vietnest-deploy[bot]@users.noreply.github.com"
          git add k8s/app.yaml
          git commit -m "deploy: VietNest ${GITHUB_SHA} [skip ci]"
          git push
