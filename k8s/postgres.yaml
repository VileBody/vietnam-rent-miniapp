apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vietnest-postgres-data
  namespace: vietnam-rent
  labels:
    app.kubernetes.io/name: vietnest-postgres
    app.kubernetes.io/part-of: vietnam-rent-miniapp
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hdd.network-drives.csi.timeweb.cloud
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vietnest-postgres
  namespace: vietnam-rent
  labels:
    app.kubernetes.io/name: vietnest-postgres
    app.kubernetes.io/part-of: vietnam-rent-miniapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vietnest-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vietnest-postgres
        app.kubernetes.io/part-of: vietnam-rent-miniapp
    spec:
      containers:
        - name: postgres
          image: ai-native-paas-registry.registry.twcstorage.ru/mirror/postgres@sha256:0a8a1e76503c091f0feb387d51b10fcd746c2d61cf6cdd6e8356973a45e40a0f
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          envFrom:
            - secretRef:
                name: vietnest-postgres
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vietnest-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: vietnest-postgres
  namespace: vietnam-rent
  labels:
    app.kubernetes.io/name: vietnest-postgres
    app.kubernetes.io/part-of: vietnam-rent-miniapp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vietnest-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
