apiVersion: apps/v1
kind: Deployment
metadata:
  name: vietnest
  namespace: vietnam-rent
  labels:
    app.kubernetes.io/name: vietnest
    app.kubernetes.io/part-of: vietnam-rent-miniapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vietnest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vietnest
        app.kubernetes.io/part-of: vietnam-rent-miniapp
      annotations:
        vietnest.teamgenius.ru/rollout-at: "2026-06-30T16:58:42Z"
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: vietnest
          image: ghcr.io/vilebody/vietnam-rent-miniapp:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: VIETNEST_UI_THEME
              value: "warm"
            - name: FREE_VIEW_LIMIT
              value: "30"
            - name: PAYWALL_ENABLED
              value: "false"
            - name: TELEGRAM_SUBSCRIPTION_URL
              value: "https://t.me/nemelokkk"
            - name: TELEGRAM_MINIAPP_URL
              value: "https://vietnam.teamgenius.ru/"
            - name: TELEGRAM_API_BASE
              value: "https://api.telegram.org"
            - name: TELEGRAM_BOT_POLLING
              value: "true"
          envFrom:
            - secretRef:
                name: vietnest-app-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vietnest
  namespace: vietnam-rent
  labels:
    app.kubernetes.io/name: vietnest
    app.kubernetes.io/part-of: vietnam-rent-miniapp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vietnest
  ports:
    - name: http
      port: 80
      targetPort: http
