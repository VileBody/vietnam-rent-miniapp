apiVersion: apps/v1
kind: Deployment
metadata:
  name: vietnest
  namespace: vietnam-rent
  labels:
    app.kubernetes.io/name: vietnest
    app.kubernetes.io/part-of: vietnam-rent-miniapp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: vietnest
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vietnest
        app.kubernetes.io/part-of: vietnam-rent-miniapp
      annotations:
        vietnest.teamgenius.ru/rollout-at: "2026-07-17T16:23:14Z"
    spec:
      imagePullSecrets:
        - name: craas-ai-native-paas-registry
      containers:
        - name: vietnest
          image: ai-native-paas-registry.registry.twcstorage.ru/mirror/legacy/vietnest@sha256:83c2a1afa37fc98dc726511d6d7a1997847c586bd759309632133d4b5ad63be3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: MEDIA_ROOT
              value: "/app/media"
            - name: VIETNEST_UI_THEME
              value: "warm"
            - name: FREE_VIEW_LIMIT
              value: "30"
            - name: PAYWALL_ENABLED
              value: "false"
            - name: ADS_ENABLED
              value: "false"
            - name: AD_FREQUENCY
              value: "6"
            - name: TADS_DEBUG
              value: "false"
            - name: TADS_TGB_FREQUENCY
              value: "0"
            - name: TADS_FULLSCREEN_FREQUENCY
              value: "0"
            - name: TELEGRAM_SUBSCRIPTION_URL
              value: "https://t.me/nemelokkk"
            - name: TELEGRAM_MINIAPP_URL
              value: "https://vietnam.teamgenius.ru/"
            - name: TELEGRAM_API_BASE
              value: "https://api.telegram.org"
            - name: TELEGRAM_BOT_POLLING
              value: "true"
          envFrom:
            - secretRef:
                name: vietnest-app-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: media
              mountPath: /app/media
              readOnly: true
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: vietnest-media
---
apiVersion: v1
kind: Service
metadata:
  name: vietnest
  namespace: vietnam-rent
  labels:
    app.kubernetes.io/name: vietnest
    app.kubernetes.io/part-of: vietnam-rent-miniapp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: vietnest
  ports:
    - name: http
      port: 80
      targetPort: http
